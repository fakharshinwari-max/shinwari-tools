<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Shinwari Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .brand {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        h2 { text-align: center; color: #333; font-size: 20px; margin-bottom: 5px; }
        p.sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 600; }
        input {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: #4CAF50; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4CAF50, #2e7d32);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            margin-top: 5px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .error-box {
            background: #ffe0e0;
            color: red;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .free-badge {
            background: #e8f5e9;
            color: #4CAF50;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
        .links { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
        .links a { color: #4CAF50; text-decoration: none; font-weight: 600; }
        .back-home { display: block; text-align: center; margin-top: 15px; color: #888; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">Shinwari Tools</div>
        <h2>Create Free Account</h2>
        <p class="sub">Join thousands of users today</p>

        <div class="free-badge">
            ✅ Free account includes daily usage of all 9 tools!
        </div>

        {% if error %}
        <div class="error-box">❌ {{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm" placeholder="Confirm password" required>
            </div>
            <button type="submit" class="btn">Create Free Account →</button>
        </form>

        <div class="links">
            Already have an account? <a href="/login">Login</a>
        </div>

        <a href="/" class="back-home">← Back to Home</a>
    </div>
</body>
</html>
